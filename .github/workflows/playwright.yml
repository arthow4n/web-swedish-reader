# To make this workflow a mandatory check before merging PRs, you need to configure a branch ruleset in GitHub:
# 1. Go to your repository on GitHub and click "Settings".
# 2. In the left sidebar, click on "Rules" -> "Rulesets".
# 3. Click "New branch ruleset". Give it a name (e.g., "Require PR Checks").
# 4. Under "Target branches", click "Add target" -> "Include default branch" (or target 'main'/'master').
# 5. Under "Rules", check the box for "Require status checks to pass".
# 6. Click the "Add checks" button.
# 7. Search for the job name "test" (the name of the job defined below) and select it.
# 8. Ensure the "Enforcement status" at the top is set to "Active" and click "Create" or "Save changes".

name: Playwright Tests
on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]
jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 18
      - name: Install dependencies
        run: npm ci
      - name: Install Playwright Browsers
        run: npx playwright install --with-deps
      - name: Run Playwright tests
        run: npx playwright test
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 30
